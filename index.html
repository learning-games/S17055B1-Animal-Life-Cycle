<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ท่องโลกวิทยาศาสตร์ ตอน วัฏจักรชีวิตของสัตว์</title>

<style>
/* =========================
   ฟอนต์/ธีมพื้นฐาน
   ========================= */
@font-face{
  font-family: 'MyGameFont';
  src: url('image/THSarabunNew.woff2') format('woff2'),
       url('image/THSarabunNew.woff') format('woff'),
       url('image/THSarabunNew.ttf') format('truetype');
  font-weight: 400; font-style: normal; font-display: swap;
}
@font-face{
  font-family: 'MyGameFont';
  src: url('image/THSarabunNewBold.woff2') format('woff2'),
       url('image/THSarabunNewBold.woff') format('woff'),
       url('image/THSarabunNewBold.ttf') format('truetype');
  font-weight: 700; font-style: normal; font-display: swap;
}
html, body, button, input, select, textarea {
  font-family: 'MyGameFont', system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
}
:root{
  --glass: rgba(0,0,0,.45);
  --ok:#10b981; --bad:#ef4444;

  /* ปรับตำแหน่ง/ขนาดวงกลมตัวเลือก 3 ปุ่มด้านบน */
  --opt-top: 10vh;                 /* ระยะจากบน (แถวปุ่ม) */
  --opt-size: clamp(80px, 19vw, 280px);
  --opt-gap: 18vw;   /* ช่องว่างคงที่กว้างมาก */

  /* ปรับข้อความคำถามด้านล่าง */
  --q-bottom: 9vh;                 /* ระยะจากล่าง */
  --q-font: clamp(50px, 10vw, 96px);
  --q-slide-ms: 750ms;             /* เวลา slide ข้อความเข้า */
  --q-offset-x: 22vw;              /* ระยะเริ่มเลื่อนนอกจอ (แนวนอน) */

  --hud-top: 14px;
  --safe-top: env(safe-area-inset-top,0px);
}

/* พื้นหลัง */
html,body{ height:100%; margin:0 }
body{
  background:url("image/background2.png") center/cover no-repeat fixed;
  overflow:hidden; color:#fff;
}

/* 🔥 ด่าน 4 ใช้พื้นหลังใหม่ (เฉพาะโหมดปกติ) */
body.level4-mode:not(.camera-on){
  background:url("image/background3.png") center/cover no-repeat fixed !important;
}

#game{ position:relative; width:100vw; height:100vh; overflow:hidden }

/* =========================
   HUD + นาฬิกา + คะแนน
   ========================= */
.hud{
  position:fixed;
  inset: calc(var(--safe-top) + var(--hud-top)) 5px auto 38px !important;
  display:flex; align-items:center; gap:12px; justify-content:space-between;
  pointer-events:none; z-index:40000;
}
body:not(.in-game):not(.prestart) .hud { display:none !important; }

#clock.clock-pill{
  position:fixed; top:14px; left:50%; transform:translateX(-50%);
  z-index:16000; pointer-events:none;
  --clock-size: 40px; font-size:var(--clock-size);
  background:var(--glass); backdrop-filter:blur(6px); color:#fff;
  font-weight:1000; line-height:1; border-radius:999px; padding:8px 16px;
  box-shadow:0 4px 18px rgba(0,0,0,.25); text-shadow:0 3px 10px rgba(0,0,0,.55);
}
.pill{ background:var(--glass); backdrop-filter:blur(6px); padding:8px 12px; border-radius:999px; box-shadow:0 4px 18px rgba(0,0,0,.25) }
.btn-mini{ pointer-events:auto; background:#1f2937; color:#fff; border:none; border-radius:12px; padding:8px 12px; font-weight:800; cursor:pointer; box-shadow:0 4px 18px rgba(0,0,0,.25) }
.score-label{ 
font-size:18px; 
font-weight:900; 
opacity:.95; margin:2px 0 4px; text-align:right }

/* ===== Hover Effect ปุ่ม HUD ซ้าย (เมนู / หยุด / กล้อง) ===== */
.hud .btn-mini{
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  will-change: transform;
}

.hud .btn-mini:hover{
  transform: scale(1.15); /* 👈 เพิ่มจาก 1.06 → 1.15 */
  box-shadow: 
    0 0 10px rgba(255,255,255,.25),   /* 👈 เพิ่ม glow */
    0 14px 36px rgba(0,0,0,.55);      /* 👈 เงาเข้มขึ้น */
}

.hud .btn-mini:active{
  transform: scale(0.9); /* 👈 กดยุบชัดขึ้น */
}


/* ===== Hover Effect ปุ่ม Mute / Fullscreen ===== */
#muteBtn, #fsBtn{
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  will-change: transform;
}

#muteBtn:hover, #fsBtn:hover{
  transform: scale(1.25); /* 👈 จาก 1.1 → 1.25 (เห็นชัดมาก) */
  box-shadow: 
    0 0 12px rgba(255,255,255,.3),
    0 14px 36px rgba(0,0,0,.55);
}

#muteBtn:active, #fsBtn:active{
  transform: scale(0.85);
}


/* ปรับตำแหน่งคำว่า "คะแนน" */
.score-label{
  margin-right:16px;  /* เลื่อนออกจากกล่องทอง */
  margin-top:-6px;    /* เลื่อนขึ้นเล็กน้อย */
}


.pill.gold{
  --score-size: 46px; 
border-radius: 12px; 
padding:6px 8px; min-width: 
calc(var(--score-size)*1.6);
}
.pill.gold .num{ 
font-size:var(--score-size); 
font-weight:1000; 
letter-spacing:.5px 
}

/* จัดกึ่งกลางตัวเลขในกล่องทอง */
.pill.gold{
  display:flex;
  justify-content:center;  /* กึ่งกลางแนวนอน */
  align-items:center;      /* กึ่งกลางแนวตั้ง */
  text-align:center;
}
.pill.gold .num{
  display:block;
  width:100%;
}


/* ย้ายปุ่ม HUD ไปมุมซ้าย/ขวาแน่นอน */
.hud { position: initial !important; inset:auto !important; }
.hud .left, .hud .right{
  position:fixed !important; top:var(--hud-top) !important; z-index:50000; pointer-events:none;
}
.hud .left { left: 16px !important; }
.hud .right{ right:16px !important; }
.hud .btn-mini{ pointer-events:auto }

/* =========================
   Welcome / Landing
   ========================= */
#welcome{
  position:fixed;
  inset:0;
  background:url("image/welcomepage.png") center/cover no-repeat fixed;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:clamp(10px, 2vh, 24px);
  padding:clamp(12px, 3vh, 32px) 16px;
  box-sizing:border-box;
  z-index:25000;
  transition:opacity .3s ease;
  overflow:hidden;
}
#welcome.hide{ opacity:0; pointer-events:none; visibility:hidden }

#welcome .brand{
  width:min(92vw, 1100px);
  max-height:calc(100dvh - 140px);
  margin-bottom:clamp(12px, 6vh, 100px);
  display:flex;
  justify-content:center;
  align-items:center;
  flex:0 1 auto;
}
#welcome .brand img{
  width:100%;
  max-width:100%;
  max-height:min(58dvh, 620px);
  height:auto;
  display:block;
  object-fit:contain;
  filter:drop-shadow(0 6px 18px rgba(0,0,0,.45));
  animation:pulse 3s infinite ease-in-out;
}

#welcome #enterBtn{
  flex:0 0 auto;
  max-width:min(92vw, 420px);
  padding:clamp(10px, 1.6vh, 12px) clamp(20px, 3vw, 28px);
  font-size:clamp(20px, 3.2vw, 36px);
  font-weight:1000;
  border-radius:18px;

  color:#fff;

  /* 🌿 ธีมเขียวธรรมชาติ */
  background:
    linear-gradient(180deg, rgba(255,255,255,.18), rgba(0,0,0,.10)),
    linear-gradient(135deg, #65a30d 0%, #16a34a 50%, #166534 100%);

  border:2px solid rgba(255, 240, 180, .55);

  /* ปรับ contrast ตัวหนังสือ */
  text-shadow:
    0 2px 6px rgba(0,0,0,.55),
    0 0 14px rgba(190, 250, 160, .35);

  box-shadow:
    inset 0 2px 8px rgba(255,255,255,.30),
    inset 0 -4px 10px rgba(0,0,0,.30),
    0 0 18px rgba(132, 204, 22, .35),
    0 12px 32px rgba(0,0,0,.4);

  cursor:pointer;
  white-space:nowrap;
}

@keyframes pulse{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }

#landing{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  gap:clamp(10px, 2vh, 22px);
  align-items:center;
  justify-content:center;
  padding:clamp(12px, 3vh, 32px) 16px;
  box-sizing:border-box;
  overflow:hidden;
  background:url("image/welcomepage.png") center/cover no-repeat fixed;
  z-index:20000;
  transition:opacity .3s ease;
}

#landing.hide{ opacity:0; pointer-events:none; visibility:hidden }
#landing .brand{
  width:min(92vw, 1100px);
  max-height:min(42dvh, 360px);
  display:flex;
  justify-content:center;
  align-items:center;
  flex:0 1 auto;
}
#landing .brand img{
  width:100%;
  max-width:100%;
  max-height:100%;
  height:auto;
  display:block;
  object-fit:contain;
  filter:drop-shadow(0 10px 30px rgba(0,0,0,.6));
}
.level-menu{
  display:flex;
  flex-direction:column;
  gap:clamp(8px, 1.5vh, 14px);
  width:min(92vw, 640px);
  max-height:min(48dvh, 420px);
  flex:0 1 auto;
}

.levelBtn{
  width:100%;
  min-height:clamp(48px, 7vh, 80px);
  padding:clamp(12px, 2.2vh, 18px) clamp(16px, 2vw, 20px);
  font-size:clamp(20px, 3.2vw, 34px);
  font-weight:1000;
  line-height:1.2;
  border-radius:18px;

  color:#fff;

  /* 🌿 ธีมเขียวธรรมชาติ */
  background:
    linear-gradient(180deg, rgba(255,255,255,.20), rgba(0,0,0,.10)),
    linear-gradient(135deg, #84cc16 0%, #22c55e 50%, #15803d 100%);

  border:2px solid rgba(255, 240, 180, .50);

  /* กันตัวหนังสือจม */
  text-shadow:
    0 2px 6px rgba(0,0,0,.55),
    0 0 12px rgba(190, 250, 160, .30);

  box-shadow:
    inset 0 2px 8px rgba(255,255,255,.25),
    inset 0 -4px 10px rgba(0,0,0,.25),
    0 0 14px rgba(132, 204, 22, .25),
    0 10px 28px rgba(0,0,0,.35);

  cursor:pointer;
  text-align:center;
}
/* ===== Hover Effect ปุ่มเลือกด่าน ===== */
.levelBtn{
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
}

.levelBtn:hover{
  background:
    linear-gradient(180deg, rgba(255,255,255,.30), rgba(0,0,0,.05)),
    linear-gradient(135deg, #a3e635 0%, #4ade80 50%, #16a34a 100%);
  border-color: rgba(255, 240, 180, .85);
  transform: translateY(-3px) scale(1.02);
  box-shadow:
    inset 0 2px 8px rgba(255,255,255,.4),
    inset 0 -4px 10px rgba(0,0,0,.25),
    0 0 22px rgba(190, 250, 100, .50),
    0 14px 36px rgba(0,0,0,.45);
}

.levelBtn:active{
  transform: scale(0.96);
}

/* =========================
   หน้าสตาร์ท / นับถอยหลัง
   ========================= */
#startScreen{ position:fixed; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; background:#000; z-index:30000; text-align:center; padding:24px }
#startTitle{ font-size:clamp(26px,5vw,48px); font-weight:900; margin-bottom:10px }

#startBtn{
  margin-top:18px;
  padding:16px 36px;               /* 👈 ปุ่มใหญ่ขึ้นชัดเจน */
  font-size:clamp(22px, 4vw, 42px);
  border:2px solid rgba(255, 240, 180, .55);
  border-radius:18px;
  font-weight:1000;
  cursor:pointer;

  /* 🌿 ธีมเขียวธรรมชาติ */
  background:
    linear-gradient(180deg, rgba(255,255,255,.22), rgba(0,0,0,.08)),
    linear-gradient(135deg, #84cc16 0%, #22c55e 50%, #15803d 100%);
  color:#fff;

  text-shadow:
    0 2px 6px rgba(0,0,0,.55),
    0 0 14px rgba(190, 250, 160, .35);

  box-shadow:
    inset 0 2px 10px rgba(255,255,255,.30),
    inset 0 -4px 12px rgba(0,0,0,.30),
    0 0 22px rgba(132, 204, 22, .40),
    0 14px 34px rgba(0,0,0,.4);
}

/* ===== Hover Effect ปุ่มเริ่ม ===== */
#startBtn{
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  will-change: transform;
}

#startBtn:hover{
  transform: scale(1.18);   /* 👈 เด้งชัด */
  border-color: rgba(255, 240, 180, .9);
  box-shadow:
    inset 0 2px 10px rgba(255,255,255,.45),
    inset 0 -4px 12px rgba(0,0,0,.25),
    0 0 36px rgba(190, 250, 100, .65),
    0 20px 46px rgba(0,0,0,.6);
}

#startBtn:active{
  transform: scale(0.92);   /* 👈 กดยุบชัด */
}

#countdown{ display:none; font-size:clamp(56px,12vw,120px); font-weight:1000; line-height:1; margin-top:8px }

/* =========================
   โครงสร้างคำถาม/คำตอบแบบใหม่
   ========================= */
/* แถวปุ่ม 3 วงกลมด้านบน */
#choicesRow{
  position:fixed; left:50%; transform:translateX(-50%);
  top:var(--opt-top); display:flex; gap:var(--opt-gap);
  z-index:12000; pointer-events:auto;
}

.option.circle{
  width:var(--opt-size); height:var(--opt-size);
  border-radius:50%;
  /* เพิ่มเส้นขอบเข้มกว่าสีหลักเล็กน้อย */
  border:10px solid rgba(0,0,0,0.25);
  background:
    radial-gradient(35% 35% at 30% 30%, rgba(255,255,255,.18), rgba(255,255,255,0) 60%) padding-box,
    var(--ring, linear-gradient(130deg,#999,#666)) border-box;
  box-shadow:0 8px 28px rgba(0,0,0,.35);
  display:grid; place-items:center; cursor:pointer; user-select:none;
  overflow:hidden;
}

.option.circle img{ width:90%; height:90%; object-fit:contain; filter:drop-shadow(0 6px 14px rgba(0,0,0,.45)) }

/* เข้า: slide-in จากด้านบนทีละปุ่ม */
.option.circle.pre-in{ opacity:0; transform:translateY(-40px); }
.option.circle.go-in{ opacity:1; transform:translateY(0); transition: transform 600ms cubic-bezier(.2,.9,.2,1), opacity 600ms; }

/* กล่องครอบตัวเลือก 1 ชิ้น (รูปวงกลม + แคปชันด้านล่าง) */
.option-wrap{
  display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  gap:8px;
  position:relative;
}

/* แคปชันใต้รูป – ปรับได้ด้วยตัวแปร */
.option-wrap .opt-cap{
  font-size: var(--cap-font, clamp(16px, 2.8vw, 24px));
  font-weight: 900;
  color: #fff;
  line-height: 1.1;
  text-align: center;
  text-shadow: 0 2px 6px rgba(0,0,0,.6);
  transform: translateY(var(--cap-offset-y, 0px));
  max-width: min(22vw, 260px);
  white-space: normal;
}

body.level2-mode .option-wrap .opt-cap{
  display:none !important;
}

/* ออก: ปุ่มถูกเลือก → ขยายแล้วหดจนหาย */
.option.circle.pick-pop{ animation: pickPop 620ms ease forwards; }
@keyframes pickPop{ 0%{transform:scale(1)} 45%{transform:scale(1.15)} 100%{transform:scale(.2); opacity:0} }

/* ออก: ปุ่มไม่ได้เลือก → slide-out ขึ้นด้านบน */
.option.circle.slide-up-out{ animation: slideUpOut 560ms ease forwards; }
@keyframes slideUpOut{ to{ transform:translateY(-60px); opacity:0 } }
/* ให้ทั้งกล่องคำตอบ (วงกลม+แคปชัน) เป็นตัวอนิเมต */
.option-wrap{ will-change: transform, opacity; }

/* ถูกเลือก = ป๊อปขึ้นนิดนึงแล้วยุบจางหาย (วง+แคปชันพร้อมกัน) */
.option-wrap.is-chosen .option.circle{ animation: circlePop .52s cubic-bezier(.2,.9,.2,1) forwards; }
.option-wrap.is-chosen .opt-cap     { animation: capFadeUp .52s ease forwards; }

/* ไม่ถูกเลือก = เฟดขึ้นเบา ๆ แล้วหาย (วง+แคปชันพร้อมกัน) */
.option-wrap.is-faded  .option.circle{ animation: circleFadeUp .42s ease forwards; }
.option-wrap.is-faded  .opt-cap      { animation: capFadeUp .42s ease forwards; }

/* คีย์เฟรมที่ใช้ */
@keyframes circlePop{
  0%{ transform:scale(1); opacity:1 }
  35%{ transform:scale(1.12) }
  100%{ transform:scale(.85); opacity:0 }
}
@keyframes circleFadeUp{ to{ transform:translateY(-20px); opacity:0 } }
@keyframes capFadeUp{   to{ transform:translateY(-24px); opacity:0 } }
/* จบรอบ: ย่อทั้งกล่องแล้วค่อยหาย (กันชนกับสถานะอื่นๆ) */
.option-wrap.is-vanish{
  animation: wrapShrinkOut var(--vanish-ms, 420ms) ease forwards;
}
.option-wrap.is-vanish .option.circle{
  animation: circleShrinkOut var(--vanish-ms, 420ms) ease forwards;
}
.option-wrap.is-vanish .opt-cap{
  animation: capFadeUp var(--vanish-ms, 420ms) ease forwards;
}

@keyframes wrapShrinkOut{
  to{ transform: scale(.88); opacity:.0; }
}
@keyframes circleShrinkOut{
  to{ transform: scale(.82); opacity:0; }
}


/* แคปชันหายตามวง (capFadeUp ถูก define แล้วด้านบน) */
.option-wrap.faded .opt-cap{ animation: capFadeUp 560ms ease forwards; }
.option-wrap.chosen .opt-cap{ animation: capFadeUp 620ms ease forwards; }

/* กล่องคำถามด้านล่าง: สไลด์แนวนอนเข้ามา */
/* กล่องคำถามด้านล่าง: วิ่งแนวนอนจากขวา -> ซ้าย */
#questionBox{
  position:fixed;
  left:0; right:0; bottom:var(--q-bottom);
  width:100vw; overflow:hidden; pointer-events:none;
  z-index:11000;
  text-align:left; /* ไม่บังคับกลาง เพราะเราจะเลื่อนเอง */
  white-space:nowrap;
  /* ขนาดตัวหนังสือยังคงใช้ตัวแปรเดิม */
  font-size:var(--q-font); font-weight:1000;
  text-shadow:0 4px 12px rgba(0,0,0,.8);
}

#questionBox .mq{
  display:inline-block;
  padding-inline: 4vw;
  will-change: transform, opacity;
  /* ป้องกันเฟรมแรกโผล่มุมซ้ายล่าง */
  opacity: 0;
  transform: translateX(100vw);
  /* ยังไม่ผูก animation ตรงนี้ รอให้ JS สั่งตอนพร้อม */
}
#questionBox .mq.run{
  opacity: 1;
  animation-name: qScrollLeft;
  animation-timing-function: linear;
  animation-iteration-count: 1; /* วิ่งครั้งเดียวตามที่ต้องการ */
}

/* keyframes วิ่งจากนอกจอขวา ไปจนพ้นซ้าย */
@keyframes qScrollLeft{
  from{ transform: translateX(100vw); }
  to  { transform: translateX(-100%); }
}

/* เร่งข้อความออกซ้ายพร้อมจาง (ใช้ตอนผู้เล่นเลือกคำตอบ) */
@keyframes qBoostOut{
  to { transform: translateX(-120%); opacity: 0; }
}

/* เร่งข้อความคำถามให้ออกซ้ายพร้อมจาง (เรียกตอนผู้เล่นกดเลือก) */
@keyframes qBoostOut{ to{ transform:translateX(-120%); opacity:0 } }

/* (ล้างคลาสเก่า ถ้ายังมีติดอยู่จากรอบก่อน) */
/* === ตราประดับใต้คำถาม === */
:root{
  --decor-w: 104vw; /* ปรับความกว้าง */
  --decor-bottom: -12vh;                /* ระยะจากขอบล่าง */
  --cap-font: clamp(24px, 5vw, 42px); /* ← เพิ่มบรรทัดนี้เพื่อคุมขนาดแคปชัน */
}

#qDecor{
  position: fixed;
  left: 50%;
  bottom: var(--decor-bottom);
  width: var(--decor-w);
  height: auto;
  transform: translateX(-50%);
  /* เดิมเป็น pointer-events:none; เปลี่ยนเป็นคลิกได้ */
  pointer-events: auto;
  cursor: pointer;
  z-index: 10950;
  filter: drop-shadow(0 6px 18px rgba(0,0,0,.35));
}

/* ปุ่มลัดสี่เหลี่ยม: ไปข้อถัดไป (ทำหน้าที่เดียวกับ object0) */

  --fast-top: 88vh;   /* ระยะจากบน */

}

#fastNext {

/* แถบคำถามยาวสุดจอ */
body.level3-mode #questionBox{

  left: 0;
  right: 0;

  transform: none;

/* ตำแหน่งตัวเลือก 2 วงกลม */
body.level3-mode #choicesRow{

  left: 0;
  right: 0;
  width: 100vw;
  transform: translateY(-50%);

  align-items: center;

  padding: 0 clamp(70px, 12vw, 240px);

}

/* กล่องครอบวงกลม */
body.level3-mode .option-wrap{

}

/* ตัวเลือกวงกลม ไม่มีขอบ */
body.level3-mode .option.circle{

  height: clamp(160px, 24vw, 320px);

  border: none !important;

  justify-content: center;

  padding: clamp(14px, 2.2vw, 28px);

  line-height: 1.05;
  text-align: center;

}

/* ไม่ใช้สี fix ซ้าย-ขวาแล้ว ให้ JS randomRing สุ่มเอง */

body.level3-mode .option-wrap:nth-child(2) .option.circle{

}

body.level3-mode .option-wrap .opt-cap{

}

body.level3-mode #questionBox.level3-fade-out{

body.level3-mode #choicesRow.level3-fade-out{

}

/* ปิดอนิเมชัน/ทรานซิชันเดิมของปุ่มตอนเฟดออก */
body.level3-mode #choicesRow.level3-fade-out .option-wrap,
body.level3-mode #choicesRow.level3-fade-out .option.circle{

  transition: none !important;

}

/* กล่องคำถาม เฟดอย่างเดียว */
@keyframes level3QuestionFadeOut{
  from{ opacity: 1; }
  to  { opacity: 0; }
}

/* แถวตัวเลือก ต้องรักษา translateY(-50%) ไว้ */
@keyframes level3ChoicesFadeOut{

    opacity: 1;
    transform: translateY(-50%);

    opacity: 0;
    transform: translateY(-50%);

body.level3-mode #fastNext{

   ด่าน 1 : Planet Viewer
   ========================= */
#level1Viewer{
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 11500;

}

}

#viewerStage{
  position: fixed;

  height: 100vh;

  pointer-events: none;
}

/* รูปเป็นวัตถุเต็มจอ แล้วเลื่อนออก/เข้าเอง */
.viewer-photo{
  position: fixed;
  left: 50%;
  top: 50%;

  width: auto;
  height: 100vh;
  max-width: 92vw;
  object-fit: contain;

  display: block;
  pointer-events: none;
  user-select: none;

  filter: drop-shadow(0 10px 28px rgba(0,0,0,.35));
  opacity: 0;

  transform: translate(-50%, -50%);
  will-change: transform, opacity;
}

.viewer-photo.is-active{
  opacity: 1;
  z-index: 2;
}

/* เดินหน้า: รูปเก่าออกซ้าย / รูปใหม่เข้าจากขวา */
.viewer-photo.slide-out-left{
  animation: viewerImgOutLeft 2200ms linear forwards;
}
.viewer-photo.slide-in-left{
  animation: viewerImgInFromRight 2200ms linear forwards;
}

/* ย้อนกลับ: รูปเก่าออกขวา / รูปใหม่เข้าจากซ้าย */
.viewer-photo.slide-out-right{
  animation: viewerImgOutRight 2200ms linear forwards;
}
.viewer-photo.slide-in-right{
  animation: viewerImgInFromLeft 2200ms linear forwards;
}

@keyframes viewerImgOutLeft{
  from{
    opacity: 1;
    transform: translate(-50%, -50%);
  }
  to{
    opacity: 1;
    transform: translate(calc(-50% - 140vw), -50%);
  }
}

@keyframes viewerImgOutRight{
  from{
    opacity: 1;
    transform: translate(-50%, -50%);
  }
  to{
    opacity: 1;
    transform: translate(calc(-50% + 140vw), -50%);
  }
}

@keyframes viewerImgInFromRight{
  from{
    opacity: 1;
    transform: translate(calc(-50% + 140vw), -50%);
  }
  to{
    opacity: 1;
    transform: translate(-50%, -50%);
  }
}

@keyframes viewerImgInFromLeft{
  from{
    opacity: 1;
    transform: translate(calc(-50% - 140vw), -50%);
  }
  to{
    opacity: 1;
    transform: translate(-50%, -50%);
  }
}

/* ===== เปลี่ยนสัตว์: cross-fade + ขยายเข้า ===== */
.viewer-photo.fade-out-animal{
  animation: viewerAnimalFadeOut 520ms cubic-bezier(.4,0,.2,1) forwards;
}
.viewer-photo.fade-in-animal{
  animation: viewerAnimalFadeIn 720ms cubic-bezier(.2,.9,.2,1) forwards;
}
@keyframes viewerAnimalFadeOut{
  from{
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    filter: blur(0px);
  }
  to{
    opacity: 0;
    transform: translate(-50%, -50%) scale(.78);
    filter: blur(8px);
  }
}
@keyframes viewerAnimalFadeIn{
  from{
    opacity: 0;
    transform: translate(-50%, -50%) scale(.78);
    filter: blur(8px);
  }
  60%{
    opacity: 1;
    filter: blur(0px);
  }
  to{
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    filter: blur(0px);
  }
}

/* ===== จัดปุ่มเป็นครึ่งวงกลม ===== */
:root{
  --info-radius: 400px; /* 🔥 ปรับระยะห่างจากจุดกลาง */
}

.planet-info-btn{
  --tx: 0px;
  --ty: 0px;
  transform: translate(-50%, -50%) translate(var(--tx), var(--ty));
}

/* บน */
.planet-info-btn:nth-child(1){
  position: absolute;
  --tx: 0px;
  --ty: calc(-1 * var(--info-radius));
}

/* ซ้าย */
.planet-info-btn:nth-child(2){
  position: absolute;
  --tx: calc(-0.9 * var(--info-radius));  /* 🔥 ขยายระยะ */
  --ty: calc(-0.7 * var(--info-radius));
}

/* ขวา */
.planet-info-btn:nth-child(3){
  position: absolute;
  --tx: calc(0.9 * var(--info-radius));   /* 🔥 ขยายระยะ */
  --ty: calc(-0.7 * var(--info-radius));
}

.planet-info-btn:hover{
  transform: translate(-50%, -50%) 
             translate(var(--tx), var(--ty)) 
             scale(1.08);
}

.planet-info-btn:active{
  transform: translate(-50%, -50%) 
             translate(var(--tx), var(--ty)) 
             scale(0.95);
}

/* ===== Fade + Glow ปุ่มข้อมูลด่าน 1 ===== */
#planetInfoToggleBtn,
.planet-info-btn{
  opacity: 0;
  filter: drop-shadow(0 0 10px rgba(250, 204, 21, .65));
  box-shadow:
    0 0 18px rgba(250, 204, 21, .75),
    0 0 34px rgba(250, 204, 21, .45),
    0 12px 30px rgba(0,0,0,.35);
}

#planetInfoToggleBtn.show{
  display: block;
  animation: planetInfoFadeIn 520ms ease forwards,
             planetInfoGlow 1600ms ease-in-out infinite;
}

#planetInfoToggleBtn.hide-out{
  display: block;
  pointer-events: none;
  animation: planetInfoFadeOut 360ms ease forwards;
}

#planetInfoButtons.show{
  display: block;
}

#planetInfoButtons.show .planet-info-btn{
  animation: planetInfoBtnFadeIn 520ms ease forwards,
             planetInfoGlow 1600ms ease-in-out infinite;
}

#planetInfoButtons.hide-out{
  display: block;
  pointer-events: none;
}

#planetInfoButtons.hide-out .planet-info-btn{
  animation: planetInfoBtnFadeOut 360ms ease forwards;
}

@keyframes planetInfoFadeIn{
  from{ opacity:0; transform: translateY(14px) scale(.96); }
  to  { opacity:1; transform: translateY(0) scale(1); }
}

@keyframes planetInfoFadeOut{
  from{ opacity:1; transform: translateY(0) scale(1); }
  to  { opacity:0; transform: translateY(14px) scale(.96); }
}

@keyframes planetInfoBtnFadeIn{
  from{
    opacity:0;
    transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) translateY(18px) scale(.94);
  }
  to{
    opacity:1;
    transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) translateY(0) scale(1);
  }
}

@keyframes planetInfoBtnFadeOut{
  from{
    opacity:1;
    transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) translateY(0) scale(1);
  }
  to{
    opacity:0;
    transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) translateY(18px) scale(.94);
  }
}

@keyframes planetInfoGlow{
  0%,100%{
    box-shadow:
      0 0 14px rgba(250, 204, 21, .55),
      0 0 28px rgba(250, 204, 21, .35),
      0 12px 30px rgba(0,0,0,.35);
  }
  50%{
    box-shadow:
      0 0 26px rgba(250, 204, 21, .95),
      0 0 52px rgba(250, 204, 21, .65),
      0 16px 38px rgba(0,0,0,.45);
  }
}

<!-- ===== ควบคุม Mute ===== -->
<script>

(function(){
  const muteBtn = document.getElementById('muteBtn');
  const bgm = document.getElementById('bgm');  // ← เพิ่ม
  if(!muteBtn || !bgm) return;
  let isMuted = false;
  function applyMute(m){
    isMuted = !!m;
    bgm.muted = isMuted;                      // ← ปิดเฉพาะ bgm
    if(isMuted){ bgm.setAttribute('muted',''); }
    else       { bgm.removeAttribute('muted'); }

    muteBtn.setAttribute('aria-pressed', String(isMuted));
    muteBtn.textContent = isMuted ? '🔇' : '🔊';
  }
  muteBtn.addEventListener('click', () => applyMute(!isMuted));
})();
</script>

<!-- ===== ควบคุม Fullscreen ===== -->
<script>
(function(){
  const fsBtn = document.getElementById('fsBtn');
  if (!fsBtn) return;
  function fsEnabled(){ return document.fullscreenEnabled || document.webkitFullscreenEnabled || document.msFullscreenEnabled }
  function isFull(){ return document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement }
  function requestFS(){ const el=document.documentElement; (el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen)?.call(el) }
  function exitFS(){ (document.exitFullscreen||document.webkitExitFullscreen||document.msExitFullscreen)?.call(document) }
  function render(){ const on=!!isFull(); fsBtn.setAttribute('aria-pressed', String(on)); fsBtn.title = on ? 'ออกจากโหมดเต็มจอ' : 'เข้าสู่โหมดเต็มจอ'; fsBtn.textContent = on ? '🗗' : '⛶' }
  if (!fsEnabled()){ fsBtn.style.display='none'; return }
  fsBtn.addEventListener('click', () => { if(isFull()) exitFS(); else requestFS() });
  document.addEventListener('fullscreenchange', render);
  document.addEventListener('webkitfullscreenchange', render);
  document.addEventListener('msfullscreenchange', render);
  render();
})();
</script>

<!-- ===== ระบบเกมหลัก (แนววัสดุ–วัตถุ) ===== -->
<script>
(()=>{
// =========================
// สถานะ/ตัวแปรหลัก
// =========================

window.__ALL_IMAGES_READY__ = false;
window.currentLevel = 1;

const GAME_DURATION_MS = 120000; // 2 นาที
let gameTimerId = null, gameEndAt = 0, remainingMs = GAME_DURATION_MS;
let running=false, ended=true, paused=false;
let awaitingContinue=false;
let score=0, round=0, awaitingAnswer=false;

// สำหรับด่าน 3 (หลายคำตอบ)
let remainingCorrect = new Set();
let __multiCorrectSet = new Set();

// สำหรับกันโจทย์ซ้ำของด่าน 2 และ 4
let usedLevel2Questions = [];
let usedLevel3Questions = [];
let usedLevel4Questions = [];

// ===== ด่าน 1/2 : Life Cycle Viewer =====
// ด่าน 1: สัตว์ที่มีวัฏจักรชีวิต 3 ระยะ (ใช้รูปจากโฟลเดอร์ 3step/)
// ด่าน 2: สัตว์ที่มีวัฏจักรชีวิต 4 ระยะ (ใช้รูปจากโฟลเดอร์ 4step/)
const LIFECYCLE_3STEP = {
  folder: '3step',
  stageNames: ['ไข่', 'ตัวอ่อน', 'ตัวเต็มวัย'], // default (fallback)
  animals: [
    { key: 'chicken',  label: 'ไก่',    stageNames: ['ไข่', 'ตัวอ่อน (ลูกเจี๊ยบ)',   'ตัวเต็มวัย (ไก่)']   },
    { key: 'duck',     label: 'เป็ด',   stageNames: ['ไข่', 'ตัวอ่อน (ลูกเป็ด)',     'ตัวเต็มวัย (เป็ด)']   },
    { key: 'turtle',   label: 'เต่า',   stageNames: ['ไข่', 'ตัวอ่อน (ลูกเต่า)',     'ตัวเต็มวัย (เต่า)']   },
    { key: 'crocodile',label: 'จระเข้', stageNames: ['ไข่', 'ตัวอ่อน (ลูกจระเข้)',   'ตัวเต็มวัย (จระเข้)'] }
  ]
};

const LIFECYCLE_4STEP = {
  folder: '4step',
  stageNames: ['ไข่', 'ตัวอ่อน', 'ดักแด้', 'ตัวเต็มวัย'], // default (fallback)
  animals: [
    { key: 'butterfly', label: 'ผีเสื้อ',  stageNames: ['ไข่', 'ตัวอ่อน (หนอน)',    'ดักแด้', 'ตัวเต็มวัย (ผีเสื้อ)']  },
    { key: 'mosquito',  label: 'ยุง',      stageNames: ['ไข่', 'ตัวอ่อน (ลูกน้ำ)',  'ดักแด้ (ตัวโม่ง)', 'ตัวเต็มวัย (ยุง)'] },
    { key: 'fly',       label: 'แมลงวัน',  stageNames: ['ไข่', 'ตัวอ่อน (หนอน)',    'ดักแด้', 'ตัวเต็มวัย (แมลงวัน)']  },
    { key: 'bee',       label: 'ผึ้ง',     stageNames: ['ไข่', 'ตัวอ่อน',            'ดักแด้', 'ตัวเต็มวัย (ผึ้ง)']     },
    { key: 'beetle',    label: 'ด้วง',     stageNames: ['ไข่', 'ตัวอ่อน (หนอน)',    'ดักแด้', 'ตัวเต็มวัย (ด้วง)']     }
  ]
};

// ลำดับการสุ่มสัตว์: shuffle ครั้งแรก แล้วเดินทีละตัว ครบแล้ววนเริ่มใหม่
let lifecycle3Queue = [];
let lifecycle3QueueIdx = 0;
let lifecycle4Queue = [];
let lifecycle4QueueIdx = 0;

function getActiveLifecycleConfig(){
  return (window.currentLevel === 2) ? LIFECYCLE_4STEP : LIFECYCLE_3STEP;
}

function buildAnimalQueue(cfg){
  // คืน array สำเนาที่ shuffle แล้ว
  return shuffle(cfg.animals.map(a => a));
}

function pickNextAnimal(){
  if (window.currentLevel === 2){
    if (lifecycle4QueueIdx >= lifecycle4Queue.length){
      lifecycle4Queue = buildAnimalQueue(LIFECYCLE_4STEP);
      lifecycle4QueueIdx = 0;
    }
    const animal = lifecycle4Queue[lifecycle4QueueIdx++];
    return animal;
  } else {
    if (lifecycle3QueueIdx >= lifecycle3Queue.length){
      lifecycle3Queue = buildAnimalQueue(LIFECYCLE_3STEP);
      lifecycle3QueueIdx = 0;
    }
    const animal = lifecycle3Queue[lifecycle3QueueIdx++];
    return animal;
  }
}

// token เพิ่มทุกครั้งที่โหลดสัตว์ใหม่ ใช้กัน callback animationend เก่ามาทำงานต่อ
let __viewerToken = 0;

// โหลดสัตว์ตัวหนึ่งเข้า viewer และแสดงระยะที่ 1 (พร้อม cross-fade transition)
function loadAnimalIntoViewer(animal){
  if (!level1Viewer || !viewerImgA || !viewerImgB || !animal) return;

  const myToken = ++__viewerToken;

  // ถ้ามีสัตว์ตัวก่อนแสดงผลอยู่ → cross-fade
  const prevActiveImg = (activeViewerSlot === 'A') ? viewerImgA : viewerImgB;
  const prevHiddenImg = (activeViewerSlot === 'A') ? viewerImgB : viewerImgA;
  const hadPrevAnimal = !!currentAnimal && prevActiveImg.classList.contains('is-active');

  const cfg = getActiveLifecycleConfig();
  currentAnimal = animal;
  currentStageCount = cfg.stageNames.length;
  // ใช้ชื่อระยะเฉพาะของสัตว์ตัวนี้ ถ้าไม่มีค่อย fallback ไป default ของด่าน
  currentStageNames = (animal.stageNames || cfg.stageNames).slice();

  level1Index = 0;
  level1Animating = false;

  hideStageCaption();
  hideSwitchAnimalBtn();

  // เคลียร์รูปฝั่ง hidden ก่อน
  prevHiddenImg.className = 'viewer-photo';
  prevHiddenImg.style.opacity = '0';
  prevHiddenImg.removeAttribute('src');

  // preload รูปทั้งหมดของสัตว์ใหม่ไว้ก่อน
  preloadCurrentAnimalImages();

  const firstSrc = buildStageSrc(currentAnimal.key, 0);

  const startFadeIn = () => {
    if (myToken !== __viewerToken) return;
    // ใช้ฝั่ง hidden เป็นรูปใหม่ (cross-fade)
    const incomingImg = prevHiddenImg;
    incomingImg.src = firstSrc;

    const showAndFadeIn = () => {
      if (myToken !== __viewerToken) return;
      level1Animating = true; // ล็อกการกดลูกศรระหว่าง fade-in
      incomingImg.className = 'viewer-photo is-active fade-in-animal';
      incomingImg.style.opacity = '';

      const onIn = () => {
        if (myToken !== __viewerToken) return;
        incomingImg.classList.remove('fade-in-animal');
        // สลับ slot — จากนี้ incomingImg เป็น "active"
        activeViewerSlot = (activeViewerSlot === 'A') ? 'B' : 'A';
        level1Animating = false;
        syncLevel1Nav();
        scheduleStageCaption(0);
      };
      incomingImg.addEventListener('animationend', onIn, { once:true });

      // safety fallback หาก animationend ไม่ trigger
      setTimeout(() => {
        if (myToken !== __viewerToken) return;
        if (!incomingImg.classList.contains('fade-in-animal')) return;
        incomingImg.removeEventListener('animationend', onIn);
        onIn();
      }, 1000);
    };

    const img = new Image();
    img.src = firstSrc;
    img.decode ? img.decode().catch(()=>{}).finally(showAndFadeIn) : showAndFadeIn();
  };

  if (hadPrevAnimal){
    // มีสัตว์ตัวก่อนอยู่ → fade-out รูปเดิมก่อน แล้วค่อย fade-in รูปใหม่
    level1Animating = true; // ล็อกการกดลูกศรระหว่าง fade-out
    prevActiveImg.classList.remove('slide-out-left','slide-out-right','slide-in-left','slide-in-right','fade-in-animal');
    prevActiveImg.classList.add('fade-out-animal');

    const onOut = () => {
      if (myToken !== __viewerToken) return;
      prevActiveImg.className = 'viewer-photo';
      prevActiveImg.style.opacity = '0';
      prevActiveImg.removeAttribute('src');
      // เริ่มโหลดและ fade-in รูปใหม่
      preloadOne(firstSrc).then(startFadeIn);
    };
    prevActiveImg.addEventListener('animationend', onOut, { once:true });

    // safety: ถ้า animationend ไม่ trigger (เช่น tab อยู่ background) จะ fallback หลัง 700ms
    setTimeout(() => {
      if (myToken !== __viewerToken) return;
      if (!prevActiveImg.classList.contains('fade-out-animal')) return; // เริ่ม fade-in ไปแล้ว
      prevActiveImg.removeEventListener('animationend', onOut);
      onOut();
    }, 700);
  } else {
    // เปิด viewer ครั้งแรก → ไม่มีรูปเก่า → fade-in อย่างเดียว
    prevActiveImg.className = 'viewer-photo';
    prevActiveImg.style.opacity = '0';
    prevActiveImg.removeAttribute('src');
    preloadOne(firstSrc).then(startFadeIn);
  }

  syncLevel1Nav();
}

  currentAnimal = null;

  viewerImgA.removeAttribute('src');
  viewerImgB.className = 'viewer-photo';

  // สุ่ม queue ของสัตว์ใหม่ทุกครั้งที่เริ่มด่าน → สัตว์ตัวแรกจะไม่ซ้ำเดิมแน่นอน
  resetLifecycleQueueForCurrentLevel();

  // เลือกสัตว์ตัวแรกจาก queue ที่สุ่มใหม่
  loadAnimalIntoViewer(pickNextAnimal());
}

function updateLevel1Viewer(step){
  if (!currentAnimal || level1Animating) return;
  hideStageCaption();
  hideSwitchAnimalBtn();

  const oldIndex = level1Index;
  const newIndex = oldIndex + step;

  if (newIndex < 0 || newIndex >= currentStageCount) {
    syncLevel1Nav();
    return;
  }

  const myToken = __viewerToken;
  level1Animating = true;
  level1Index = newIndex;

  const currentImg = (activeViewerSlot === 'A') ? viewerImgA : viewerImgB;
  const nextImg    = (activeViewerSlot === 'A') ? viewerImgB : viewerImgA;

  const goNext = step > 0;

  nextImg.style.opacity = '0';
  nextImg.className = 'viewer-photo';
  currentImg.className = 'viewer-photo is-active';

  const newSrc = buildStageSrc(currentAnimal.key, newIndex);

  const startSlide = () => {
    if (myToken !== __viewerToken) return; // ถูกเปลี่ยนสัตว์ระหว่างทาง
    void nextImg.offsetWidth;

    nextImg.style.opacity = '';

    if (goNext){
      currentImg.classList.add('slide-out-left');
      nextImg.classList.add('slide-in-left');
    } else {
      currentImg.classList.add('slide-out-right');
      nextImg.classList.add('slide-in-right');
    }

    const onDone = ()=>{
      if (myToken !== __viewerToken) return;
      currentImg.className = 'viewer-photo';
      nextImg.className = 'viewer-photo is-active';
      activeViewerSlot = (activeViewerSlot === 'A') ? 'B' : 'A';
      level1Animating = false;
      syncLevel1Nav();
      scheduleStageCaption(newIndex);
    };

    nextImg.addEventListener('animationend', onDone, { once:true });
  };

  const cached = __imgMemo.get(newSrc);
  if (cached) {
    nextImg.src = newSrc;
    requestAnimationFrame(startSlide);
  } else {
    nextImg.src = '';
    nextImg.onload = () => { nextImg.onload = null; startSlide(); };
    nextImg.onerror = () => { nextImg.onerror = null; startSlide(); };
    nextImg.src = newSrc;
  }
}

// เร่งข้อความคำถามให้พุ่งออกซ้ายอย่างไว
function boostQuestionOutFast(ms=280){
  const span = qBox.querySelector('.mq');
  if(!span) return;

  const cs = getComputedStyle(span);
  let tx = 0;
  const m = cs.transform || cs.webkitTransform || 'none';
  if (m && m !== 'none') {
    const mm = m.match(/matrix\(([^)]+)\)/);
    if (mm) {
      const parts = mm[1].split(',').map(parseFloat);
      tx = parts[4] || 0; // a,b,c,d, tx, ty
    }
  }

  span.style.animation = 'none';
  span.style.willChange = 'transform, opacity';
  span.style.transform = `translateX(${tx}px)`;
  span.getBoundingClientRect(); // reflow

  const r  = span.getBoundingClientRect();
  const pr = qBox.getBoundingClientRect();
  const delta = (pr.left - r.right) - 20; // เผื่อเลยซ้าย 20px

  span.style.transition = `transform ${ms}ms linear, opacity ${ms}ms linear`;
  span.style.transform  = `translateX(${tx + delta}px)`;
  span.style.opacity    = '0.2';

  span.addEventListener('transitionend', () => { span.remove(); }, { once:true });
}

function fmtClock(ms){ const t=Math.max(0,Math.ceil(ms/1000)); const m=String(Math.floor(t/60)).padStart(2,'0'); const s=String(t%60).padStart(2,'0'); return m+':'+s; }
function renderClock(){ const ms=(clockState==='run')?Math.max(0,(gameEndAt-performance.now())):remainingMs; clockEl.textContent=fmtClock(ms); }
function startClockUI(){ clockState='run'; if(!clockUIItv) clockUIItv=setInterval(renderClock,250); renderClock(); }
function pauseClockUI(){ clockState='pause'; if(clockUIItv){ clearInterval(clockUIItv); clockUIItv=null; } renderClock(); }
function stopClockUI(){ clockState='end'; if(clockUIItv){ clearInterval(clockUIItv); clockUIItv=null; } renderClock(); }
function resetClockUI(){ clockState='idle'; if(clockUIItv){ clearInterval(clockUIItv); clockUIItv=null; } clockEl.textContent=fmtClock(GAME_DURATION_MS); }

// เอฟเฟกต์ตอบถูก/ผิด: ฝนอีโมจิดาวตก
let __emojiMeteorTimer = null;

function flyScore(ok){
  const layer = document.getElementById('emojiMeteorLayer');
  if (!layer) return;

  layer.innerHTML = '';
  clearTimeout(__emojiMeteorTimer);

  // ชุดอีโมจิตอนตอบถูก: สัตว์ในเกม + สัญลักษณ์เชียร์
  const correctSets = [
    ['🦋','🐛','🐝','🐞'],          // ผีเสื้อ หนอน ผึ้ง เต่าทอง
    ['🐔','🐤','🐥','🐣'],          // ไก่ + ลูกเจี๊ยบ + ไข่ฟัก
    ['🐦','🦅','🐢','🐊'],          // นก/เต่า/จระเข้
    ['🥚','🐛','🦋'],               // วัฏจักร 4 ระยะ (ไข่→หนอน→ผีเสื้อ)
    ['🌱','🌿','🍃'],               // ต้นอ่อน/ใบเขียว
    ['⭐','🌟','✨','🎉']           // เชียร์
  ];

  // ชุดอีโมจิตอนตอบผิด: ใบไม้แห้ง ก้อนหิน กระดูก (ธีมธรรมชาติ)
  const wrongSets = [
    ['🍂','🪨','🦴'],                // ใบไม้แห้ง + ก้อนหิน + กระดูก
    ['🍂','🍁','🪨'],                // ใบไม้แห้ง 2 แบบ + ก้อนหิน
    ['❌','💢']                       // กากบาท + โมโห
  ];

  const emojiSet = ok ? pick(correctSets) : pick(wrongSets);
  const count = ok ? 34 : 26;

  for (let i = 0; i < count; i++){
    const e = document.createElement('div');
    e.className = 'emoji-meteor';
    e.textContent = pick(emojiSet);

    const startX = rand(-20, 105);
    const startY = rand(-28, 22);
    const size = rand(26, 76);
        const dur = rand(1600, 2300);
        const dx = rand(240, 560);
        const dy = rand(520, 900);
    const rot1 = rand(-80, 80);
    const rot2 = rot1 + rand(180, 760);

    e.style.setProperty('--x', startX + 'vw');
    e.style.setProperty('--y', startY + 'vh');
    e.style.setProperty('--s', size + 'px');
    e.style.setProperty('--d', dur + 'ms');
    e.style.setProperty('--dx', dx + 'px');
    e.style.setProperty('--dy', dy + 'px');
    e.style.setProperty('--r', rot1 + 'deg');
    e.style.setProperty('--rr', rot2 + 'deg');

    e.style.animationDelay = rand(0, 220) + 'ms';

    layer.appendChild(e);
  }

  __emojiMeteorTimer = setTimeout(()=>{
    layer.innerHTML = '';
  }, 2000);
}

function drawLevel3SolarQuiz(){
  if (usedLevel3Questions.length >= LEVEL3_SOLAR_QUIZ.length) {
    usedLevel3Questions = [];
  }

  const remainingQuestions = LEVEL3_SOLAR_QUIZ.filter(q => !usedLevel3Questions.includes(q));
  const q = pick(remainingQuestions);
  usedLevel3Questions.push(q);

  const wrong = pick(q.wrongs);
  const answers = shuffle([
    { name: q.correct, caption: q.correct, isCorrect: true },
    { name: wrong, caption: wrong, isCorrect: false }
  ]);

  return {
    questionText: q.questionText,
    answers,
    correctIndex: answers.findIndex(a => a.isCorrect)
  };
}

function drawLevel3(){
  const q = pick(LEVEL3_BANK);

  const allAnswers = q.answers.map((a, idx) => ({
    ...a,
    _originalIndex: idx
  }));

  // 1) สุ่มคำตอบถูกมา 1 ตัวจาก correctIndices
  const correctPool = allAnswers.filter(a => q.correctIndices.includes(a._originalIndex));
  const pickedCorrect = pick(correctPool);

  // 2) สุ่มคำตอบผิดมา 2 ตัวจากที่เหลือ
  const wrongPool = allAnswers.filter(a => !q.correctIndices.includes(a._originalIndex));
  const pickedWrong = shuffle(wrongPool).slice(0, 2);

  // 3) รวมให้เหลือแค่ 3 ตัวเลือก แล้วสุ่มตำแหน่ง
  const answers = shuffle([pickedCorrect, ...pickedWrong]);

  // 4) หา index ใหม่ของคำตอบถูก หลัง shuffle
  const correctIndices = answers
    .map((a, pos) => q.correctIndices.includes(a._originalIndex) ? pos : -1)
    .filter(pos => pos !== -1);

  return {
    questionText: q.questionText,
    answers: answers.map(({ _originalIndex, ...rest }) => rest),
    correctIndices
  };
}

function drawLevel4(){

  if (usedLevel4Questions.length >= LEVEL4_BANK.length) {

  const q = pick(remainingQuestions);

  usedLevel4Questions.push(q);

    ...a,
    _originalIndex: idx
  }));

  // สุ่มคำตอบถูกมา 1 ตัว
  const correctPool = allAnswers.filter(a => q.correctIndices.includes(a._originalIndex));
  const pickedCorrect = pick(correctPool);

  // สุ่มคำตอบผิดมา 2 ตัว
  const wrongPool = allAnswers.filter(a => !q.correctIndices.includes(a._originalIndex));
  const pickedWrong = shuffle(wrongPool).slice(0, 2);

  // รวมให้เหลือ 3 ตัวเลือก
  const answers = shuffle([pickedCorrect, ...pickedWrong]);

  const correctIndices = answers
    .map((a, pos) => q.correctIndices.includes(a._originalIndex) ? pos : -1)
    .filter(pos => pos !== -1);

  return {
    questionText: q.questionText,
    answers: answers.map(({ _originalIndex, ...rest }) => rest),
    correctIndices
  };
}

// ด่าน 1: วัสดุ -> เลือกวัตถุ (คำตอบถูกมาจาก LEVEL1_BINDINGS, ตัวหลอกจาก OBJECTS)
function drawLevel1(){
  const keys = Object.keys(LEVEL1_BINDINGS);
  const material = pick(keys);

  const correct = pick(LEVEL1_BINDINGS[material]);

  // ตัวหลอกจากวัสดุอื่น
  const fakes = shuffle(
      keys.filter(k => k !== material)
  ).slice(0,2).map(k => pick(LEVEL1_BINDINGS[k]));

  const candidates = shuffle([
      { ...correct, _ok:true },
      ...fakes
  ]);
  const correctIndex = candidates.findIndex(c => c._ok);

  return {
    questionText: material,
    answers: candidates.map(c => ({
      type: 'object',
      name: c.caption,
      img:  c.img,
      tag:  material,
      caption: c.caption
    })),
    correctIndex
  };
}

function drawLevel2(){
  // ถ้าใช้ครบทุกข้อแล้ว ค่อยรีใหม่
  if (usedLevel2Questions.length >= OBJECTS.length) {
    usedLevel2Questions = [];
  }

  // เลือกเฉพาะข้อที่ยังไม่เคยใช้
  const remainingObjects = OBJECTS.filter(o => !usedLevel2Questions.includes(o));
  const obj = pick(remainingObjects);

  // จำว่าข้อนี้ถูกใช้แล้ว
  usedLevel2Questions.push(obj);

  const question = obj.name;
  const correctMats = obj.materials || [obj.material];

  // สุ่มคำตอบถูกมา 1 ตัวจากตัวที่ยอมรับได้
  const pickedCorrectMat = pick(correctMats);

  const correct = {
    img: MATERIAL_IMG[pickedCorrectMat],
    caption: pickedCorrectMat
  };

  const mats = Object.keys(MATERIAL_IMG).filter(m => !correctMats.includes(m));
  const distract = shuffle(mats)
    .slice(0, 2)
    .map(m => ({
      img: MATERIAL_IMG[m],
      caption: m
    }));

  const candidates = shuffle([
    { img: correct.img, caption: correct.caption, _ok: true },
    ...distract
  ]);

  const correctIndex = candidates.findIndex(c => c._ok);

  return {
    questionText: question,
    answers: candidates.map(c => ({
      type: 'material',
      name: c.caption,
      img: c.img,
      tag: c.caption,
      caption: c.caption
    })),
    correctIndex
  };
}

// =========================
const __imgMemo = new Map();
function preloadOne(src, timeout=8000, tries=2){
  if(!src) return Promise.resolve(false);
  if(__imgMemo.has(src)) return __imgMemo.get(src);
  const runner = (attempt)=> new Promise(resolve=>{
    const img = new Image(); let done=false;
    const settle = ok=>{ if(done) return; done=true;
      // ถ้าโหลดสำเร็จ decode เพื่อให้ GPU พร้อม (non-blocking)
      if(ok && img.decode){ img.decode().catch(()=>{}).finally(()=>resolve(true)); }
      else { resolve(ok); }
    };
    const t = setTimeout(()=>{ img.onload=img.onerror=null; settle(false) }, timeout);
    img.onload = ()=>{ clearTimeout(t); settle(true) };
    img.onerror= ()=>{ clearTimeout(t); (attempt<tries)? setTimeout(()=>runner(attempt+1).then(resolve), 250): settle(false) };
    img.decoding='async'; img.loading='eager'; img.referrerPolicy='no-referrer'; img.src=src;
  });
  const p=runner(0); __imgMemo.set(src,p); return p;
}
async function preloadInBatches(urls,batch=16,onProgress=()=>{}){
  const list=[...new Set(urls.filter(Boolean))]; let done=0;
  for(let i=0;i<list.length;i+=batch){
    const chunk=list.slice(i,i+batch);
    await Promise.allSettled(chunk.map(u=>preloadOne(u)));
    done+=chunk.length; onProgress(Math.round((done/list.length)*100));
    await new Promise(r=>setTimeout(r,60));
  }
}

function scheduleGameTimer(ms){
  clearTimeout(gameTimerId);
  gameTimerId=setTimeout(()=>{ if(!ended) endLevel() }, Math.max(0,ms|0));
}
function startGameTimer(){
  remainingMs = GAME_DURATION_MS;
  gameEndAt = performance.now() + remainingMs;
  scheduleGameTimer(remainingMs);
  startClockUI();
}
function pauseGameTimer(){
  if(gameTimerId){
    remainingMs=Math.max(0,gameEndAt - performance.now());
    clearTimeout(gameTimerId); gameTimerId=null;
    pauseClockUI();
  }
}
function resumeGameTimer(){
  if(remainingMs>0 && !ended){
    gameEndAt = performance.now() + remainingMs;
    scheduleGameTimer(remainingMs);
    startClockUI();
  }
}

function stopGameTimerHard(){
  clearTimeout(gameTimerId);
  gameTimerId = null;
  gameEndAt = 0;
  remainingMs = GAME_DURATION_MS;
  stopClockUI();
  if (clockEl) clockEl.textContent = '02:00';
}

function startGame(){
  document.body.classList.add('in-game');

  ended = false;
  paused = false;

  overlay.style.visibility = 'hidden';
  overlay.style.opacity = '0';

  score = 0;
  round = 0;

  qDecor?.classList.remove('arm-next');
  syncFastNextUI();

  bgm?.play?.().catch(()=>{});

  hideLevel1Viewer();
  syncHudByLevel();

  if (isViewerLevel()){
    // ด่าน 1, 2 = viewer ไม่มีระบบเวลาเลย
    stopGameTimerHard();

    qBox.textContent = '';
    qBox.style.display = 'none';
    qDecor.style.display = 'none';
    choicesRow.style.display = 'none';
    fastNext.classList.remove('show','arm-next');
    fastNext.style.display = 'none';
  } else {
    // ด่านอื่นใช้เวลาเหมือนเดิม
    startGameTimer();

    qBox.style.display = '';
    qDecor.style.display = '';
    choicesRow.style.display = '';
    fastNext.style.display = '';
  }

  // รอให้ภาพพร้อมก่อนเริ่มรอบแรก (ถ้ายังไม่พร้อม)
  if (window.__ALL_IMAGES_READY__) {
    nextRound();
  } else {
    (async () => {
      while (!window.__ALL_IMAGES_READY__) {
        await new Promise(r => setTimeout(r, 80));
      }
      if (!ended) nextRound();
    })();
  }
}

<script>
(function(){

  if(!SR){ micBtn.textContent='🎤 ไม่รองรับ'; micBtn.disabled=true; return }
  const rec = new SR(); rec.lang='th-TH'; rec.continuous=true; rec.interimResults=true;
  function tokensFrom(s){ s=(s||'').toLowerCase().trim(); s=s.replace(/\s*(ค่ะ|ครับ|คะ|ฮะ)$/,''); return s.split(/[\s,，。\.!?:;、]+/).filter(Boolean) }
  function currentOptionsMap(){ const map=new Map(); document.querySelectorAll('.option').forEach(n=>{ const t=(n.getAttribute('alt')||n?.querySelector('img')?.alt||'').trim().toLowerCase(); if(!map.has(t)) map.set(t,[]); map.get(t).push(n) }); return map }
  function pickNearest(arr){ return arr[0] }
  function tryFire(phrase){ const toks=tokensFrom(phrase); if(!toks.length) return false; const cmap=currentOptionsMap(); for(const t of toks){ if(cmap.has(t)){ const node = pickNearest(cmap.get(t)); node?.click(); return true } } return false }
  rec.onresult=(e)=>{ for(let i=e.resultIndex;i<e.results.length;i++){ const r=e.results[i]; const txt=(r[0]?.transcript||'').trim(); if(!txt) continue; tryFire(txt) } };

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>

<!-- ===== กล้อง (มือเป็นวงกลมแตะเลือกช้อยส์) ===== -->
<script type="module">
import {PoseLandmarker, FilesetResolver} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
const camBtn = document.getElementById('camBtn');
const video  = document.getElementById('cameraMirror');

const personCvs = document.getElementById('personCanvas');
const personCtx = personCvs.getContext('2d', { alpha: true });

const cvs    = document.getElementById('camCanvas');
const ctx    = cvs.getContext('2d', { alpha: true });
const DETECT_W = 320;
let detectCanvas = document.createElement('canvas');
let detectCtx = detectCanvas.getContext('2d', { alpha:false, desynchronized:true });
let CAM_ON=false, landmarker=null, raf=0, stream=null;
let selfieSegmentation=null;
let segmentBusy=false;
let lastSegAt=0;
const SEGMENT_FPS=24;

function fitPersonCanvas(){
  const dpr = 1;
  personCvs.width = Math.round(innerWidth * dpr);
  personCvs.height = Math.round(innerHeight * dpr);
  personCvs.style.width = innerWidth + 'px';
  personCvs.style.height = innerHeight + 'px';
  personCtx.setTransform(1,0,0,1,0,0);
  personCtx.scale(dpr,dpr);
}

async function ensureSelfieSegmentation(){
  if (selfieSegmentation) return selfieSegmentation;

  selfieSegmentation = new SelfieSegmentation({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
  });

selfieSegmentation.setOptions({
  modelSelection: 1,
  selfieMode: false
});

  selfieSegmentation.onResults(drawSegmentedPerson);
  return selfieSegmentation;
}

function drawCoverMirrored(ctx2, source, sx, sy, sw, sh, dx, dy, dw, dh){
  ctx2.save();

  // mirror ให้เหมือน cameraMirror เดิม
  ctx2.translate(dx + dw, dy);
  ctx2.scale(-1, 1);

  ctx2.drawImage(
    source,
    sx, sy, sw, sh,
    0, 0, dw, dh
  );

  ctx2.restore();
}

function drawSegmentedPerson(results){
  const {sX, sY, sW, sH, sw, sh} = coverCropRect();

  personCtx.save();

  // รีเซ็ต composite ก่อนทุกเฟรม กันภาพเพี้ยนสะสม
  personCtx.globalCompositeOperation = 'source-over';
  personCtx.clearRect(0, 0, sw, sh);

  // 1) วาด mask โดยใช้ crop เดียวกับภาพกล้อง
  drawCoverMirrored(
    personCtx,
    results.segmentationMask,
    sX, sY, sW, sH,
    0, 0, sw, sh
  );

  // 2) ให้แสดงเฉพาะพื้นที่คน
  personCtx.globalCompositeOperation = 'source-in';

  // 3) วาดภาพจริง โดยใช้ crop เดียวกับ mask 100%
  drawCoverMirrored(
    personCtx,
    results.image,
    sX, sY, sW, sH,
    0, 0, sw, sh
  );

  personCtx.globalCompositeOperation = 'source-over';
  personCtx.restore();
}

async function updateSegmentedPerson(now){
  if (!selfieSegmentation || segmentBusy) return;
  if (now - lastSegAt < 1000 / SEGMENT_FPS) return;

  lastSegAt = now;
  segmentBusy = true;

  try{
    await selfieSegmentation.send({ image: video });
  }catch(e){}

  segmentBusy = false;
}

// ===== ปุ่มที่ให้มือแตะได้ในด่าน 1 =====
const arQDecor = document.getElementById('qDecor');
const arFastNext = document.getElementById('fastNext');
const arViewerPrev = document.getElementById('viewerPrev');
const arViewerNext = document.getElementById('viewerNext');
const arPlanetInfoToggleBtn = document.getElementById('planetInfoToggleBtn');
const arPlanetInfoButtons = document.getElementById('planetInfoButtons');
const arPlanetInfoClose = document.getElementById('planetInfoClose');
const arPlanetInfoModal = document.getElementById('planetInfoModal');

function fitCanvas(){
  const dpr = CAM_ON? 1 : Math.max(1, window.devicePixelRatio||1);
  cvs.width=Math.round(innerWidth*dpr);
  cvs.height=Math.round(innerHeight*dpr);
  cvs.style.width=innerWidth+'px';
  cvs.style.height=innerHeight+'px';
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr,dpr);

  fitPersonCanvas();
}
fitCanvas(); addEventListener('resize', fitCanvas);

function coverCropRect(){ const vw=video.videoWidth||640, vh=video.videoHeight||480; const sw=innerWidth, sh=innerHeight; const scale=Math.max(sw/vw, sh/vh); const sW=Math.round(sw/scale), sH=Math.round(sh/scale); const sX=Math.round((vw-sW)/2), sY=Math.round((vh-sH)/2); return {sX,sY,sW,sH,vw,vh,sw,sh} }
function mapToScreen(nx,ny){ const {sX,sY,sW,sH,vw,vh,sw,sh} = coverCropRect(); const px=nx*vw, py=ny*vh; const u=(px-sX)/sW, v=(py-sY)/sH; let x=u*sw, y=v*sh; x=sw-x; return {x,y} }

const SHOW_HAND_BALL=false;
const lastHitAt=new WeakMap();
const HIT_LOCK_MS=650;
function circleIntersectsRect(cx,cy,r, rc){ const nx=Math.max(rc.left, Math.min(cx, rc.right)); const ny=Math.max(rc.top, Math.min(cy, rc.bottom)); const dx=cx-nx, dy=cy-ny; return (dx*dx+dy*dy)<=r*r }

function isVisibleForHand(el){
  if (!el) return false;
  const st = getComputedStyle(el);
  const rc = el.getBoundingClientRect();

  return (
    st.display !== 'none' &&
    st.visibility !== 'hidden' &&
    st.pointerEvents !== 'none' &&
    rc.width > 0 &&
    rc.height > 0 &&
    rc.bottom >= 0 &&
    rc.right >= 0 &&
    rc.top <= innerHeight &&
    rc.left <= innerWidth
  );
}

function handClick(el){
  if (!el || !isVisibleForHand(el)) return;

  const t = performance.now();
  const last = lastHitAt.get(el) || 0;
  if (t - last < HIT_LOCK_MS) return;

  lastHitAt.set(el, t);
  el.click();
}

function hitByCircle(center, r){
  const targets = [
    ...document.querySelectorAll('.option.circle'),

    arFastNext,

    // ด่าน 1: ปุ่มเปลี่ยนดาว
    arViewerPrev,
    arViewerNext,

    // ด่าน 1: ปุ่มข้อมูลซ้ายล่าง
    arPlanetInfoToggleBtn,

    // ด่าน 1: ปุ่มข้อมูล 3 ปุ่ม
    ...document.querySelectorAll('.planet-info-btn'),

    // ด่าน 1: ปุ่มปิดหน้าต่าง
    arPlanetInfoClose
  ].filter(Boolean);

  for (const n of targets){
    if (!isVisibleForHand(n)) continue;

    const rc = n.getBoundingClientRect();

    if (circleIntersectsRect(center.x, center.y, r, rc)){
      handClick(n);
      break;
    }
  }
}

async function ensureLandmarker(){ if(landmarker) return landmarker; const fileset = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"); landmarker = await PoseLandmarker.createFromOptions(fileset, { baseOptions:{ modelAssetPath:"https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task" }, runningMode:'VIDEO', numPoses:1, minPoseDetectionConfidence:.35, minPosePresenceConfidence:.35, minTrackingConfidence:.35 }); return landmarker }
function drawHandBall(elbowIdx, wristIdx, lm){ if(!lm[elbowIdx]||!lm[wristIdx]) return null; const elbow = mapToScreen(lm[elbowIdx].x, lm[elbowIdx].y); const wrist = mapToScreen(lm[wristIdx].x, lm[wristIdx].y); const r=24; const L=Math.max(1, Math.hypot(wrist.x-elbow.x, wrist.y-elbow.y)); const ux=(wrist.x-elbow.x)/L, uy=(wrist.y-elbow.y)/L; const HAND_PUSH=1.5, PUSH_PX=6; const center={ x: wrist.x + ux*(r*HAND_PUSH+PUSH_PX), y: wrist.y + uy*(r*HAND_PUSH+PUSH_PX) }; if(SHOW_HAND_BALL){ ctx.beginPath(); ctx.arc(center.x,center.y,r,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill(); ctx.lineWidth=3; ctx.strokeStyle='#fff'; ctx.stroke(); } hitByCircle(center, r*.95); return center }
function drawPoseAndColliders(res){ const sw=innerWidth, sh=innerHeight; ctx.clearRect(0,0,sw,sh); if(!res?.landmarks?.length) return; const lm=res.landmarks[0]; drawHandBall(13,15,lm); drawHandBall(14,16,lm) }

function runLoop(){
  const step=()=>{
    if(!video.videoWidth){
      raf=requestAnimationFrame(step);
      return;
    }

    const now=performance.now();

    try{
      // วาดเฉพาะคนลง personCanvas
      updateSegmentedPerson(now);

      // ระบบสัมผัสมือเดิม ไม่แตะต้อง
      const {sX,sY,sW,sH}=coverCropRect();
      detectCtx.drawImage(video, sX,sY,sW,sH, 0,0, detectCanvas.width, detectCanvas.height);
      const res=landmarker.detectForVideo(detectCanvas, now);
      drawPoseAndColliders(res);
    }catch(e){}

    raf=requestAnimationFrame(step);
  };

  raf=requestAnimationFrame(step);
}

async function startCamera(){
  await ensureLandmarker();
  await ensureSelfieSegmentation();

  stream = await navigator.mediaDevices.getUserMedia({
    video: { width: 960, height: 540, frameRate: 30, facingMode: 'user' },
    audio: false
  });

  video.srcObject=stream;
  await video.play().catch(()=>{});

  const vw=video.videoWidth||640, vh=video.videoHeight||480;
  const ratio=vw/vh;
  detectCanvas.width=DETECT_W;
  detectCanvas.height=Math.round(DETECT_W/ratio);

  // เปิด video ไว้เป็นต้นทาง แต่ซ่อนภาพเดิม
  video.style.display='block';
  video.style.opacity='0';

  // แสดงเฉพาะคนหลังตัดพื้นหลัง
  personCvs.style.display='block';

  // canvas มือยังทำงานเหมือนเดิม
  cvs.style.display='block';

  camBtn.textContent='📷 กล้อง: เปิด';
  CAM_ON=true;
  fitCanvas();
  runLoop();
}

function stopCamera(){
  cancelAnimationFrame(raf);

  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    stream=null;
  }

  try{ video.pause(); }catch(e){}

  video.removeAttribute('srcObject');
  video.style.display='none';
  video.style.opacity='0';

  personCvs.style.display='none';
  personCtx.clearRect(0,0,innerWidth,innerHeight);

  cvs.style.display='none';
  ctx.clearRect(0,0,innerWidth,innerHeight);

  camBtn.textContent='📷 กล้อง: ปิด';
  CAM_ON=false;
  fitCanvas();
}

camBtn.addEventListener('click', async ()=>{ if(!stream){ try{ await startCamera() }catch(err){ camBtn.textContent='📷 กล้อง: ไม่ได้รับอนุญาต'; camBtn.disabled=true } } else { stopCamera() } });
document.addEventListener('visibilitychange', ()=>{ if(document.hidden && stream) stopCamera() });


// ===== fitTextOneLine (global helper ใช้ใน spawnLevel3Choice2) =====
function fitTextOneLine(el, maxSize = 72, minSize = 20){
  let size = maxSize;
  el.style.fontSize = size + 'px';

  while(el.scrollWidth > el.clientWidth && size > minSize){
    size -= 2;
    el.style.fontSize = size + 'px';
  }
}

// (ระบบ preload หลักอยู่ใน runGlobalPreload ที่ผูกกับ window 'load' แล้ว
//  ไม่ต้องมี IIFE ซ้ำที่นี่ เพราะทำให้โหลดภาพซ้ำและ __ALL_IMAGES_READY__ เด้งก่อนกำหนด)

</script>
